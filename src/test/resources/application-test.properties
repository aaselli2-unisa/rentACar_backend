# Minimal properties required for web-layer security tests.
# No real DB / mail / Cloudinary connection needed — @WebMvcTest mocks the service layer.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Security patch V09: access token 24h in tests for backward compat; refresh token 7 days
application.security.jwt.expiration=86400000
application.security.jwt.refresh-expiration=604800000

cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test

# Disable rate limiting in tests to avoid 429 interference between test methods
app.rate-limit.enabled=false

# V-06: expose field-level validation details in tests
app.expose-validation-details=true

spring.config.import=optional:configtree:/run/secrets/

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/rentacar}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}
app.base-url=${APP_BASE_URL:http://localhost:8080/}

application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:3600000}
application.security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator: solo health esposto, nessun dettaglio (evita info leak in prod)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# --- Snyk #73: Timing Attack — devtools mai attivo in produzione ---
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# --- Snyk #71: Incomplete Cleanup (spring-web DoS) — timeout connessioni Tomcat ---
server.tomcat.connection-timeout=5s
server.tomcat.keep-alive-timeout=20s

# --- Snyk #75/#76: Insecure Temp File / Symlink Attack — limita multipart e dir tmp ---
spring.servlet.multipart.location=/tmp/app-uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=8MB
server.tomcat.max-http-form-post-size=2MB

# --- Snyk #77: HTTP Request Smuggling — HTTP/2 elimina questa classe di vulnerabilità ---
server.http2.enabled=true

# --- Snyk #78/#79: Certificate Host Mismatch — verifica hostname su SMTP ---
spring.mail.properties.mail.smtp.ssl.checkserveridentity=true

# --- Snyk #70: Resource Allocation (pgjdbc) — cap fetch size per evitare result set illimitati ---
spring.jpa.properties.hibernate.jdbc.fetch_size=100

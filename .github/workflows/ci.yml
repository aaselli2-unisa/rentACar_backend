name: CI

on:
  push:
    branches: [master-dev,master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Permessi minimi di default — ogni job eleva solo ciò che serve.
permissions:
  contents: read

jobs:
  # ── 1. Compilazione ─────────────────────────────────────────────────────────
  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Compile (no tests)
        run: mvn -B -DskipTests compile --no-transfer-progress

  # ── 2. Security Tests (OWASP patches) ───────────────────────────────
  # Job dedicato ai test di sicurezza: fallisce la pipeline se uno fallisce.
  # Lista aggiornata al 2026-04-18: 31 classi (21 originali + EmployeeControllerSecurityTest
  # + 9 nuove classi aggiunte con i fix).
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run security test suite
        run: |
          TESTS="AccountLockoutSecurityTest,\
          AdminControllerSecurityTest,\
          AuthenticationControllerSecurityTest,\
          CorsAttackerDomainSecurityTest,\
          CorsConfigDuplicationSecurityTest,\
          CorsSecurityTest,\
          EmployeeControllerSecurityTest,\
          FileUploadSecurityTest,\
          GenericExceptionHandlerSecurityTest,\
          HardcodedCredentialsSecurityTest,\
          HttpOnlyCookieSecurityTest,\
          InputValidationSecurityTest,\
          JwtAuthFilterTest,\
          JwtClaimsPIISecurityTest,\
          JwtServiceTest,\
          JwtTtlSecurityTest,\
          LogoutSecurityTest,\
          PasswordComplexitySecurityTest,\
          PaymentValidationSecurityTest,\
          RateLimitXForwardedForSecurityTest,\
          RateLimitingBehaviorTest,\
          RateLimitingSecurityTest,\
          RefreshTokenLoggingSecurityTest,\
          RefreshTokenRevocationSecurityTest,\
          RentalControllerSecurityTest,\
          RoleEscalationSecurityTest,\
          SecurityFilterChainTest,\
          SwaggerAdminOnlySecurityTest,\
          SwaggerProdAccessSecurityTest,\
          UserControllerSecurityTest,\
          ValidationErrorExposureSecurityTest"
          TESTS=$(echo "$TESTS" | tr -d ' \n')
          mvn -B surefire:test \
            -Dspring.profiles.active=test \
            -Dtest="$TESTS" \
          mvn -B surefire:test \
            -Dspring.profiles.active=test \
            -Dtest="com.extendrent.security.*" \

            --no-transfer-progress

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: target/surefire-reports/
          retention-days: 30

  # ── 3. OWASP Dependency Check ────────────────────────────────────────────────
  # Confronta tutte le dipendenze Maven (pom.xml) con il database NVD (National
  # Vulnerability Database) di CVE pubbliche. In pratica: se stai usando una
  # libreria con una vulnerabilità nota (es. Log4Shell in log4j), questo job
  # la individua e fa fallire la pipeline prima che arrivi in produzione.
  #
  # Fallisce se trova vulnerabilità con CVSS >= 3 (HIGH o CRITICAL).
  #
  # Falsi positivi: se una CVE non è realmente sfruttabile nel progetto (es. la
  # vulnerabilità riguarda una funzione che non usi), aggiungila a
  # .github/owasp-suppressions.xml con motivazione e data di revisione.
  # I risultati appaiono anche nel tab Security → Code scanning del repo.
  #
  # Nota: la prima esecuzione scarica il NVD database (~300 MB) e può richiedere
  # alcuni minuti. Aggiungere NVD_API_KEY come secret del repo per evitare il
  # rate-limit NVD e velocizzare i run successivi.
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write   # necessario per upload SARIF al tab Security
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        with:
          project: rentACar-backend
          path: .

          format: 'ALL'
          args: >-
            --suppression .github/owasp-suppressions.xml
            --failOnCVSS 3
            --enableRetired
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload SARIF al tab Security di GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif

      - name: Upload report come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/
          retention-days: 30

  # ── 5. Docker Build (validazione, nessun push) ──────────────────────────────
  # Verifica che il Dockerfile del backend compili correttamente su ogni push.
  # Il frontend vive in un repo separato e viene buildato dal proprio pipeline.
  # Il push su ghcr.io avviene solo nel workflow deploy.yml, dopo che tutti
  # i job di questo CI sono andati a buon fine.
  docker-validate:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rentacar-app:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
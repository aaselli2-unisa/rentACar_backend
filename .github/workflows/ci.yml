name: CI

on:
  push:
    branches: [master-dev, master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Per sicurezza, impostiamo il minimo indispensabile come permessi di default.
# I singoli job che hanno bisogno di più permessi li aggiungono localmente.
permissions:
  contents: read

jobs:
  # JOB 1: gitguardian
  # Scansiona l'intera storia del progetto cercando segreti hardcoded.
  # Usa ggshield CLI direttamente (più stabile dell'action deprecata).
  # "secret scan path --recursive" genera SARIF per il tab Security.
  # "secret scan repo ." scansiona tutta la storia: blocca se trova segreti.
  gitguardian:
    name: GitGuardian Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install ggshield
        run: pip install ggshield

      - name: Scan secrets — genera SARIF
        run: ggshield secret scan path . --recursive --format sarif --output gitguardian.sarif || true
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

      - name: Upload SARIF al tab Security di GitHub
        if: hashFiles('gitguardian.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitguardian.sarif
          category: gitguardian

      - name: Scan secrets — blocca se trova segreti (full history)
        run: ggshield secret scan repo .
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}


  # JOB 2: compile
  # Gate iniziale: verifica che il codice Java compili prima di avviare
  # i job downstream. Se la build è rotta, tutti i job che dichiarano
  # "needs: compile" vengono saltati automaticamente senza sprecare runner.
  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # "actions/checkout" è l'azione ufficiale di GitHub che clona la repo sul runner.
      - uses: actions/checkout@v6

      # "actions/setup-java" è l'azione ufficiale di GitHub che installa
      # il JDK sul runner. Usiamo Java 17.
      # cache: maven → salva automaticamente la cartella ~/.m2 dove Maven scarica
      # le dipendenze tra un run e l'altro.
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # "mvn" è Maven, il tool di build del progetto Java.
      #   -B                    → modalità batch per output minimale
      #   -DskipTests           → compila senza eseguire i test (che runniamo dopo)
      #   compile               → fase di compilazione
      #   --no-transfer-progress → nasconde i progressi di download per log più puliti
      - name: Compile
        run: mvn -B -DskipTests compile --no-transfer-progress


  # JOB 3: security-tests
  # Esegue la suite di test di sicurezza del progetto.
  # Usa il profilo Maven "security-tests" definito nel pom.xml così eseguiamo
  # solo i test in src/test/java/.../security/ senza girare tutta la suite.
  # I report Surefire salvati come artifact vengono scaricati da SonarCloud
  # per calcolare la coverage senza dover rieseguire i test.
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # -Psecurity-tests           → attiva il profilo Maven "security-tests"
      #                              definito nel pom.xml, così eseguiamo solo
      #                              i test di sicurezza
      # -Dspring.profiles.active=test → attiva il profilo Spring "test" che usa
      #                              application-test.properties (DB in-memory)
      - name: Run security tests
        run: mvn -B test -Dspring.profiles.active=test -Psecurity-tests --no-transfer-progress

      # "if: always()" → questo step gira SEMPRE, così possiamo analizzare i log
      # anche quando i test falliscono.
      # "actions/upload-artifact" è l'azione ufficiale di GitHub per caricare
      # un artifact scaricabile dalla pagina del workflow.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-results
          path: target/surefire-reports/
          retention-days: 30


  # JOB 4: snyk
  # SCA (Software Composition Analysis): legge il pom.xml e confronta ogni
  # dipendenza Maven con il database CVE di Snyk.
  # Scansione low+ per visibilità completa nel tab Security.
  # Gate blocca solo su HIGH/CRITICAL con fix disponibile (upgradable).
  # I risultati appaiono nel tab Security → Code scanning del repo.
  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 15
    # security-events: write → necessario per pubblicare il report SARIF
    # nel tab Security → Code scanning di GitHub.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # snyk/actions/setup installa il CLI Snyk sul runner (senza Docker).
      # Approccio ufficiale: evita il conflitto JAVA_HOME che si verifica con
      # snyk/actions/maven, che gira in un container dove il path del runner non esiste.
      - name: Setup Snyk
        uses: snyk/actions/setup@master

      # snyk test analizza il pom.xml e confronta le dipendenze con il database CVE Snyk.
      # Step 1: --severity-threshold=low → SARIF con TUTTE le CVE (low+) per visibilità
      #         nel tab Security → Code scanning del repo. continue-on-error: true
      #         perché low/medium non devono bloccare la CI.
      # Step 2: Upload SARIF → mostra tutte le CVE nel tab Security.
      # Step 3 (gate): --severity-threshold=high --fail-on=upgradable → blocca solo
      #         su HIGH/CRITICAL con patch disponibile, che vanno effettivamente risolte.
      - name: Run Snyk — scansione completa per visibilità
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=low --sarif-file-output=snyk.sarif

      - name: Upload SARIF al tab Security di GitHub
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Gate — blocca solo su HIGH/CRITICAL con fix disponibile
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high --fail-on=upgradable


  # JOB 5: semgrep
  # SAST (Static Application Security Testing): analizza il codice sorgente Java
  # alla ricerca di pattern insicuri (injection, XSS, SSRF, ecc.)
  # con il ruleset ufficiale Semgrep per Java.
  # Blocca il CI su qualsiasi finding. I risultati appaiono nel tab Security → Code scanning.
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      # Installa semgrep via pip ed esegue l'analisi sul sorgente Java.
      #   --config=p/java → ruleset ufficiale Semgrep per Java
      #   --sarif         → output in formato SARIF per il tab Security di GitHub
      # Exit code 1 se trova findings → blocca il CI.
      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          semgrep --config=p/java --config=p/java-security-audit --sarif --output=semgrep.sarif src/main/java/

      - name: Upload SARIF al tab Security di GitHub
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif


  # JOB 6: docker-validate
  # Verifica che il Dockerfile compili correttamente senza pubblicare l'immagine.
  # Blocca il merge di modifiche che rompono la build Docker prima che arrivino
  # nel CD, dove l'immagine verrebbe pushata su ghcr.io.
  docker-validate:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # "docker/setup-buildx-action" è un'azione ufficiale di Docker che attiva
      # BuildKit, un motore di build avanzato.
      # Cache condivisibile tra runner diversi → build successive più veloci.
      - uses: docker/setup-buildx-action@v4

      # "docker/build-push-action" è l'azione ufficiale di Docker per buildare
      # e pushare le immagini. Noi non pubblichiamo: usiamo l'azione solo per
      # verificare che il Dockerfile non abbia problemi.
      # cache-from: type=gha → legge la cache di build Docker dalla cache di GitHub Actions
      # cache-to: type=gha,mode=max → salva tutti i layer così il prossimo run
      #                               parte già con i layer cachati
      - name: Docker build check (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: rentacar-app:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # JOB 7: sonarcloud
  # SAST + metriche di qualità + code coverage.
  # Aspetta security-tests per due motivi:
  #   1. Non parte se i test falliscono (quality gate implicito).
  #   2. Scarica i report Surefire per la coverage senza rieseguire i test.
  # Richiede sonar-maven-plugin nel pom.xml e le variabili SONAR_ORGANIZATION
  # e SONAR_PROJECT_KEY configurate nelle GitHub Variables del repo.
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: security-tests
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 → SonarCloud usa la storia completa dei commit per il blame
      # e per identificare le nuove issue introdotte nel PR corrente.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # Scarica i report Surefire generati da security-tests nell'artifact.
      # SonarCloud li legge per calcolare la coverage senza rieseguire i test.
      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: security-test-results
          path: target/surefire-reports/

      # "mvn sonar:sonar" esegue il plugin SonarScanner for Maven che invia
      # il codice sorgente, i bytecode e i report di test a SonarCloud.
      #   -DskipTests             → non riesegue i test, usa quelli scaricati
      #   sonar.organization      → nome dell'organizzazione su SonarCloud
      #   sonar.projectKey        → identificatore unico del progetto su SonarCloud
      #   sonar.host.url          → endpoint SonarCloud (versione hosted di SonarQube)
      # Il token è letto automaticamente dalla variabile d'ambiente SONAR_TOKEN.
      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B compile sonar:sonar
          -DskipTests
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
          -Dsonar.host.url=https://sonarcloud.io
          --no-transfer-progress

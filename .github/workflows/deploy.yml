name: Deploy

# Quando gira:
#   - push di un tag versione (es. v1.0.0)
#   - workflow_dispatch: deploy manuale dalla UI GitHub (es. rollback)

# Flusso di lavoro:
#   1. Si sviluppa su master-dev -> CI viene avviata in automatico
#   2. Si fa merge su master -> CI viene avviata di nuovo
#   3. Quando si vuole deployare una versione: git tag v1.0.0 && git push origin v1.0.0
#   4. Questo workflow parte, builda l'immagine Docker localmente, la scansiona con Trivy e Scout,
#      e solo se i gate passano la pusha su Docker Hub

# Perché i tag:
#   - Tracciamento della versione che gira in produzione
#   - Il rollback è banale: git tag v0.9.0 punta a un commit preciso

# Secrets richiesti nel repository GitHub:
#   - DOCKERHUB_USERNAME: username Docker Hub
#   - DOCKERHUB_TOKEN:    access token Docker Hub (Settings → Security → Access Tokens)
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # Job sequenziale: build locale → Trivy → Scout → push Docker Hub.
  # Il push avviene solo se entrambi i gate di sicurezza passano.
  publish:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write  # Upload risultati Trivy e Scout al tab Security di GitHub

    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/rentacar-backend

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login su Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Genera automaticamente i tag dell'immagine dal tag Git che ha triggerato il workflow.
      # Esempio: se si fa "git tag v1.2.3 && git push origin v1.2.3", i tag dell'immagine saranno:
      #   <user>/rentacar-backend:1.2.3  <- versione completa
      #   <user>/rentacar-backend:latest <- sempre l'ultima versione (usato dai manifest K8s)
      # Con workflow_dispatch (manuale senza tag): genera solo :latest
      - name: Docker metadata (tag versione)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Builda l'immagine e la carica nel daemon locale (no push).
      # Il push avviene solo dopo aver superato entrambi i gate di sicurezza.
      - name: Build immagine Docker (locale, no push)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === TRIVY ===
      # Scanner open-source per vulnerabilità CVE (OS + dipendenze Java).
      # Risultati visibili nel tab "Security -> Code scanning" del repo GitHub.

      #   Step 1 (SARIF): scansiona tutto e genera il sarif
      #   Step 2 (UPLOAD): uploada il sarif alla tab security di GH
      #   Step 3 (gate): blocca se trova CRITICAL/HIGH con fix disponibile

      #STEP1
      - name: Trivy — genera SARIF (tutte le severità)
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          image-ref: '${{ env.IMAGE }}:latest'
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      #STEP2
      - name: Upload Trivy SARIF al tab Security di GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      #STEP3
      - name: Trivy — gate CRITICAL/HIGH con fix disponibile
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          image-ref: '${{ env.IMAGE }}:latest'
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # === DOCKER SCOUT ===
      # Scanner nativo di Docker Hub per vulnerabilità CVE.
      # Analizza pacchetti OS e dipendenze Java nell'immagine finale.
      # Risultati visibili nel tab "Security -> Code scanning" del repo GitHub
      # e nella dashboard Docker Scout su hub.docker.com.

      #   Step 1 (SARIF): scansiona tutto e genera il sarif
      #   Step 2 (UPLOAD): uploada il sarif alla tab security di GH
      #   Step 3 (gate): blocca se trova CRITICAL/HIGH con fix disponibile

      #STEP1
      - name: Docker Scout — genera SARIF (tutte le severità)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: 'local://${{ env.IMAGE }}:latest'
          sarif-file: scout-results.sarif
          exit-code: false  # Non blocca: vogliamo il report completo anche se ci sono CVE

      #STEP2
      - name: Upload Scout SARIF al tab Security di GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scout-results.sarif

      #STEP3
      - name: Docker Scout — gate CRITICAL/HIGH
        uses: docker/scout-action@v1
        with:
          command: cves
          image: 'local://${{ env.IMAGE }}:latest'
          only-severities: critical,high
          only-fixed: true   # Ignora CVE senza patch disponibile
          exit-code: true    # Blocca il deploy se trova CVE gravi e risolvibili

      # Push su Docker Hub solo se entrambi i gate (Trivy e Scout) passano.
      # Usa la GHA cache del build step: nessuna ricompilazione, solo push dei layer.
      - name: Push immagine su Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
name: Deploy

# Quando gira:
#   - push di un tag versione (es. v1.0.0)
#   - workflow_dispatch: deploy manuale dalla UI GitHub (es. rollback)

# Flusso di lavoro:
#   1. Si sviluppa su master-dev -> CI viene avviata in automatico
#   2. Si fa merge su master -> CI viene avviata di nuovo
#   3. Quando si vuole deployare una versione: git tag v1.0.0 && git push origin v1.0.0
#   4. Questo workflow parte, builda l'immagine Docker, la pubblica su GHCR e la scansiona

# Perché i tag:
#   - Tracciamento della versione che gira in produzione
#   - Il rollback è banale: git tag v0.9.0 punta a un commit preciso
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # Un unico job sequenziale: build Docker, push su GHCR, scansione Trivy.
  publish:
    name: Build, Push & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write         # Push immagine su ghcr.io
      security-events: write  # Upload risultati Trivy al tab Security di GitHub

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login su GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} #chi ha triggerato il workflow
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genera automaticamente i tag dell'immagine dal tag Git che ha triggerato il workflow.
      # Esempio: se si fa "git tag v1.2.3 && git push origin v1.2.3", i tag dell'immagine saranno:
      #   ghcr.io/aaselli2-unisa/rentacar_backend:1.2.3  <- versione completa
      #   ghcr.io/aaselli2-unisa/rentacar_backend:latest <- sempre l'ultima versione (usato dai manifest K8s)
      # Con workflow_dispatch (manuale senza tag): genera solo :latest
      - name: Docker metadata (tag versione)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Builda l'immagine e pusha su GHCR.
      - name: Build e push immagine Docker
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy è uno scanner open-source di vulnerabilità (CVE) per immagini Docker.
      # Analizza i pacchetti del sistema operativo e
      # le dipendenze Java dentro l'immagine finale
      # (non il pom, ma proprio i pacchetti installati nell'immagine)

      # Trivy analizza l'immagine: "il JRE base ha CVE? ci sono
      # pacchetti OS vulnerabili? le jar dentro target/ hanno CVE?"
      # Risultati visibili nel tab "Security -> Code scanning" del repo GitHub.


      #   Step 1 (SARIF): scansiona tutto e genera il sarif
      #   Step 2 (UPLOAD) Uploadiamo il sarif alla tab security di GH
      #   Step 3 (gate): scansiona solo CRITICAL/HIGH con fix ma questa volta si blocca se trova qualcosa

      #STEP1
      - name: Trivy — genera SARIF (tutte le severità)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'  # Non blocca: vogliamo il report completo anche se ci sono CVE
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      #STEP 2
      - name: Upload SARIF al tab Security di GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      #STEP3
      - name: Trivy — gate CRITICAL/HIGH
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true  # Ignora CVE senza patch disponibile
          exit-code: '1'        # Blocca il deploy se trova CVE gravi e risolvibili
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

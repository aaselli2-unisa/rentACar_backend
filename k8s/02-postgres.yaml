# POSTGRES — PersistentVolumeClaim + Deployment + Service

# Questo file definisce tre risorse K8s separate che
# insieme replicano il servizio "postgres" del docker-compose.yml:
#
#   1. PersistentVolumeClaim (PVC): richiesta di storage su disco per i dati DB
#   2. Deployment: definisce come girare il container postgres:16
#   3. Service: espone postgres agli altri pod per nome DNS "postgres"
#
# In Docker Compose il volume "pgdata" e il servizio "postgres" erano gestiti
# automaticamente. In K8s dobbiamo dichiarare tutto esplicitamente.



# 1. PersistentVolumeClaim — pgdata-pvc
# Un PVC è una "richiesta di storage": dice al cluster "dammi 5GB di disco".
# microk8s con l'addon "storage" soddisfa automaticamente questa richiesta
# con un hostpath sul server Ubuntu (directory locale sul nodo).


#   I container K8s sono effimeri, se il pod postgres viene ricreato,
#   il filesystem interno viene distrutto. Il PVC persiste i dati anche
#   se il pod crasha o viene eliminato. Equivalente al volume "pgdata"
#   del docker-compose.yml.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata-pvc      # Nome referenziato sotto volumes.persistentVolumeClaim.claimName
  namespace: rentacar
spec:
  accessModes:
    - ReadWriteOnce     # Il volume può essere montato in lettura/scrittura da UN SOLO nodo
                        # alla volta. Corretto per PostgreSQL single-instance su single-node.
                        # (ReadWriteMany richiederebbe NFS o storage distribuito)
  resources:
    requests:
      storage: 5Gi      # 5 gigabyte di storage.
                        # microk8s hostpath-provisioner lo mappa su /var/snap/microk8s/
                        # common/default-storage/ sul server Ubuntu.

---
# 2. Deployment — postgres
# Un Deployment dichiara lo stato desiderato
# K8s si occupa di far corrispondere la
# realtà a questa dichiarazione (se il pod crasha, lo ricrea).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres         # Nome del Deployment (non visibile dall'esterno)
  namespace: rentacar
spec:
  replicas: 1            # Una sola istanza PostgreSQL. Per DB non si fa scaling
                         # orizzontale senza soluzioni dedicate.

  selector:
    matchLabels:
      app: postgres      # Il Deployment gestisce i pod con label "app: postgres".
                         # Deve matchare template.metadata.labels qui sotto.

  template:              # Template del pod: ogni replica viene creata da questo
    metadata:
      labels:
        app: postgres    # Label che identifica questo pod. Usato da:
                         # - selector.matchLabels sopra (Deployment trova i suoi pod)
                         # - Service selector (trova i pod a cui mandare traffico)
    spec:
      containers:
        - name: postgres          # Nome del container dentro il pod (informativo)
          image: postgres:16      # Immagine Docker ufficiale PostgreSQL versione 16.
                                  # Stesso tag usato nel docker-compose.yml.

          env:
            - name: POSTGRES_DB   # Nome del database da creare all'avvio del container.
              value: rentacar     # Stesso valore del docker-compose.yml (POSTGRES_DB: rentacar).

            - name: POSTGRES_USER # Username dell'utente PostgreSQL da creare.
              value: postgres     # Deve matchare DB_USERNAME nel ConfigMap (01-configmap.yaml).

            - name: POSTGRES_PASSWORD_FILE
              # Dice a postgres:16 di leggere la password da un FILE invece che
              # da una env var in chiaro (POSTGRES_PASSWORD). Più sicuro.
              # Il percorso /run/secrets/DB_PASSWORD è montato dal volume sotto.
              value: /run/secrets/DB_PASSWORD

          ports:
            - containerPort: 5432  # Porta standard PostgreSQL. Esposta solo internamente
                                   # al pod; il Service sotto la rende accessibile al cluster.

          volumeMounts:
            - name: pgdata               # Monta il PVC pgdata-pvc definito sopra
              mountPath: /var/lib/postgresql/data  # Percorso standard dove postgres
                                                   # scrive i dati. Deve essere questo esatto path.

            - name: db-secret            # Monta il Secret K8s come file
              mountPath: /run/secrets/DB_PASSWORD  # Percorso atteso da POSTGRES_PASSWORD_FILE
              subPath: DB_PASSWORD       # "subPath" monta solo la chiave "DB_PASSWORD" del Secret
                                         # come file, non l'intero Secret come directory.
              readOnly: true             # Il container non deve scrivere il secret.

          readinessProbe:
            # K8s usa readinessProbe per decidere se il pod è pronto a ricevere traffico.
            # Finché non è ready, il Service non manda richieste a questo pod.
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "rentacar"]
              # pg_isready: utility postgres che verifica connettività al DB
            initialDelaySeconds: 10  # Aspetta 10s prima del primo check (postgres ci mette ~5-10s ad avviarsi)
            periodSeconds: 5         # Riprova ogni 5 secondi
            failureThreshold: 10     # Dopo 10 fallimenti consecutivi → pod "not ready"

          livenessProbe:
            # livenessProbe: se fallisce, K8s RIAVVIA il container.
            # Stessa logica di readiness ma con soglie più alte (non vogliamo
            # riavvii frequenti su un DB che sta solo caricando dati).
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "rentacar"]
            initialDelaySeconds: 30  # Aspetta 30s prima del primo check liveness
            periodSeconds: 10

      volumes:
        - name: pgdata               # Volume che soddisfa il mount "pgdata" sopra
          persistentVolumeClaim:
            claimName: pgdata-pvc   # Riferimento al PVC definito in cima a questo file

        - name: db-secret            # Volume che soddisfa il mount "db-secret" sopra
          secret:
            secretName: rentacar-secrets  # Secret K8s creato da setup-secrets.sh
                                          # Contiene DB_PASSWORD, JWT_SECRET, ecc.

---

# 3. Service — postgres

# Un Service K8s espone i pod con un IP stabile e un nome DNS.
# Senza Service, i pod hanno IP effimeri che cambiano ad ogni riavvio.
# Con questo Service, Spring Boot può connettersi semplicemente a "postgres:5432".
#
# IMPORTANTE: il nome "postgres" qui deve corrispondere a "postgres" nella
# DB_URL del ConfigMap: jdbc:postgresql://postgres:5432/rentacar
# K8s risolve "postgres" → ClusterIP di questo Service via CoreDNS.

apiVersion: v1
kind: Service
metadata:
  name: postgres         # Nome DNS del service. Raggiungibile come "postgres" dagli
                         # altri pod nello stesso namespace, o "postgres.rentacar.svc.cluster.local"
                         # da altri namespace.
  namespace: rentacar
spec:
  selector:
    app: postgres        # Manda traffico ai pod con label "app: postgres"
                         # (cioè i pod del Deployment postgres sopra)
  ports:
    - port: 5432         # Porta esposta dal Service (quella che usano i client)
      targetPort: 5432   # Porta del container a cui forwardare il traffico
                         # (containerPort del Deployment sopra)
  # type non specificato → default ClusterIP:
  # il Service è raggiungibile SOLO dall'interno del cluster, non dall'esterno.
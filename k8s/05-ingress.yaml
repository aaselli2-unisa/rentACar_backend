# INGRESS — rentacar-ingress

# Un Ingress è il punto di ingresso del traffico HTTP/HTTPS dall'esterno
# del cluster verso i Service interni.
#
# Senza Ingress, i pod sono raggiungibili solo dall'interno del cluster.
# L'Ingress usa nginx-ingress-controller (abilitato con "microk8s enable ingress")
# per ricevere traffico sulla porta 80 del nodo Ubuntu e forwardarlo al
# Service rentacar-frontend.
#
# Flusso del traffico esterno:
#
#   Browser utente
#     → IP:80 del server Ubuntu
#       → nginx-ingress-controller (pod in namespace ingress)
#         → Service rentacar-frontend (ClusterIP)
#           → Pod nginx frontend
#             → File statici React (per "/")
#             → proxy_pass a rentacar-app:8080 (per "/api/*")
#               → Pod Spring Boot
#                 → PostgreSQL
#
#   L'Ingress manda tutto a frontend nginx. Il frontend fa proxy /api/.
#   Spring Boot non è mai esposto direttamente a internet: l'unico punto
#   di ingresso dall'esterno è l'Ingress, che conosce solo il frontend.
#
# Configurazione senza dominio:
#   Senza "host:" specificato, l'Ingress è accessibile da http://IP-SERVER-UBUNTU/ senza DNS.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rentacar-ingress    # Nome dell'Ingress (informativo)
  namespace: rentacar

  annotations:
    # Annotations: configurazione specifica per nginx-ingress-controller.
    # Questi parametri vengono letti dal controller nginx e tradotti in
    # direttive nginx.conf del pod ingress-controller.

    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Timeout in secondi per leggere la risposta dal backend (frontend nginx,
    # che a sua volta chiama Spring Boot).

    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Timeout in secondi per inviare la richiesta al backend.
    # Simmetrico al proxy-read-timeout.

spec:
  ingressClassName: nginx
  # Specifica quale ingress controller gestisce questa risorsa.
  # microk8s con "microk8s enable ingress" installa nginx-ingress-controller
  # che si registra come classe "nginx". Senza questo campo, K8s non sa
  # quale controller deve processare l'Ingress.

  rules:
    # Lista di regole di routing. Ogni regola può filtrare per host e path.
    - http:
        # Nessun "host:" specificato
        # Permette accesso tramite IP diretto (es. http://192.168.1.62/)
        paths:
          - path: /
            # Tutto il traffico che arriva su "/" e sottopercorsi va al frontend.
            # Il frontend nginx gestisce internamente la separazione:
            #   - "/" → serve index.html (React SPA)
            #   - "/api/" → proxy_pass a rentacar-app:8080
            #   - "/*.js, /*.css" → file statici con cache

            pathType: Prefix
            # Prefix: "/" matcha "/" e tutti i sottopercorsi ("/api/cars", "/login", ecc.).

            backend:
              service:
                name: rentacar-frontend
                # Nome del Service K8s a cui forwardare il traffico.
                # Deve corrispondere a metadata.name in 04-frontend.yaml.
                port:
                  number: 80
                  # Porta del Service rentacar-frontend (non del container direttamente).
                  # Il Service poi forwarda alla containerPort 8080 del pod nginx
                  # (il container usa 8080 perché nginx gira senza root).

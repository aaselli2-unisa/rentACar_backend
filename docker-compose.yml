services:
  postgres:
    image: postgres:16
    container_name: rentacar-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: rentacar
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD_FILE: /run/secrets/DB_PASSWORD
    # Porta commentata: il DB non deve essere esposto all'host in produzione.
    # Decommentare SOLO per sviluppo locale (DBeaver, psql, ecc.)
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets:
      - DB_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d rentacar"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rentacar-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentacar-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/rentacar
      SPRING_PROFILES_ACTIVE: docker
    # Porta non esposta all'host: il frontend nginx fa da reverse proxy internamente.
    # Decommentare SOLO per debug diretto dell'API.
    # ports:
    #   - "8080:8080"
    secrets:
      - DB_PASSWORD
      - JWT_SECRET
      - CLOUDINARY_CLOUD_NAME
      - CLOUDINARY_API_KEY
      - CLOUDINARY_API_SECRET
      - MAIL_USERNAME
      - MAIL_PASSWORD
    # Snyk #75/#76: Insecure Temp File / Symlink Attack — /tmp in-memory, non eseguibile
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    networks:
      - rentacar-net

  frontend:
    build:
      context: ../rent-a-car-frontend-project
      dockerfile: Dockerfile
    container_name: rentacar-frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - rentacar-net

networks:
  rentacar-net:
    driver: bridge

volumes:
  pgdata:

secrets:
  DB_PASSWORD:
    file: ./secrets/DB_PASSWORD
  JWT_SECRET:
    file: ./secrets/JWT_SECRET
  CLOUDINARY_CLOUD_NAME:
    file: ./secrets/CLOUDINARY_CLOUD_NAME
  CLOUDINARY_API_KEY:
    file: ./secrets/CLOUDINARY_API_KEY
  CLOUDINARY_API_SECRET:
    file: ./secrets/CLOUDINARY_API_SECRET
  MAIL_USERNAME:
    file: ./secrets/MAIL_USERNAME
  MAIL_PASSWORD:
    file: ./secrets/MAIL_PASSWORD